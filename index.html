<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/aa355dcc5f.js" crossorigin="anonymous"></script>
</head>
<body>
<div class="body">
  <div class="container">
    <div class="screen">
      <p id="screen"></p>
    </div>
    <div class="keypad">
      <div class="buttons">
        <button class="button" id="clear" value="clear">C</button>
        <button class="button" id="operators" value="÷">÷</button>
        <button class="button" id="operators" value="×">×</button>
        <button class="button" id="delete" value="erase"><i class="fa-solid fa-delete-left"></i></button>
        <button class="button" id="numbers" value="7">7</button>
        <button class="button" id="numbers" value="8">8</button>
        <button class="button" id="numbers" value="9">9</button>
        <button class="button" id="operators" value="-">-</button>
        <button class="button" id="numbers" value="4">4</button>
        <button class="button" id="numbers" value="5">5</button>
        <button class="button" id="numbers" value="6">6</button>
        <button class="button" id="operators" value="+">+</button>
        <button class="button" id="numbers" value="1">1</button>
        <button class="button" id="numbers" value="2">2</button>
        <button class="button" id="numbers" value="3">3</button>
        <button class="button" id="numbers" value="%">%</button>
        <button class="button" id="numbers" value="0">0</button>
        <button class="button" id="numbers" value=".">.</button>
        <button class="button" id="equal" value="=">=</button>
      </div>
    </div>
  </div>
</div>
    
  <script src="script.js"></script>
</body>
</html>
